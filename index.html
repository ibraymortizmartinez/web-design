<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Contacto - ConnectTech</title>
    <link rel="icon" type="image/png" href="./assets/img/solicitud.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <div class="logo-icon"></div>
            <span class="logo-text"><strong>Connect</strong>Tech</span>
        </div>
        
        <nav class="main-nav">
            <ul>
                <li><a href="#">INICIO</a></li>
                <li><a href="#">SERVICIOS</a></li>
                <li><a href="#">NOSOTROS</a></li>
                <li><a href="#" class="active">CONTACTO</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <h1 class="page-title">SOLICITUD DE CONTACTO</h1>

        <section class="form-section">
            <header class="form-header">
                <h2>FORMULARIO DE REGISTRO DE DATOS</h2>
            </header>

            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="nombre">NOMBRE COMPLETO</label>
                    <div class="input-wrapper">
                        <span class="icon-container"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="correo">CORREO ELECTRÓNICO</label>
                    <div class="input-wrapper">
                        <span class="icon-container"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="telefono">TELÉFONO MÓVIL</label>
                    <div class="input-wrapper">
                        <span class="icon-container"><i class="fa-solid fa-mobile-screen-button"></i></span>
                        <input type="tel" id="telefono" name="telefono" placeholder="912 345 678">
                    </div>
                </div>

                <div class="form-group">
                    <label for="empresa">EMPRESA/ORGANIZACIÓN</label>
                    <div class="input-wrapper">
                        <span class="icon-container"><i class="fa-solid fa-building"></i></span>
                        <input type="text" id="empresa" name="empresa" placeholder="Nombre de su Empresa">
                    </div>
                </div>

                <div class="form-group">
                    <label for="mensaje">MENSAJE O CONSULTA</label>
                    <div class="input-wrapper textarea-wrapper">
                        <span class="icon-container"><i class="fa-solid fa-comment-dots"></i></span>
                        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escriba su mensaje aquí..." required></textarea>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    ENVIAR MENSAJE <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <strong>Connect</strong>Tech &copy; 2026
            </div>
            
            <div class="programmer-info">
                Diseñado por el Programador <strong>Ange Ibraym Ortiz Martínez</strong>
            </div>

            <div class="social-links">
                <a href="#" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#" target="_blank"><i class="fa-solid fa-globe"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
